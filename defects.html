<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>缺失管理</title>
<link rel="stylesheet" href="css/style.css">
<style>
.current-project {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #3a7bd5;
}

/* 圖片預覽樣式 */
.preview-container {
  margin: 10px 0;
  position: relative;
}

.preview-image {
  max-width: 200px;
  max-height: 150px;
  border-radius: 4px;
}

.remove-preview {
  position: absolute;
  top: -5px;
  right: -5px;
  background: rgba(255, 0, 0, 0.7);
  color: white;
  width: 20px;
  height: 20px;
  text-align: center;
  line-height: 20px;
  border-radius: 50%;
  cursor: pointer;
}

/* 缺失狀態樣式 */
.status-badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 4px;
  color: white;
  font-size: 12px;
  margin-right: 5px;
}

.status-pending {
  background-color: #f39c12;
}

.status-completed {
  background-color: #2ecc71;
}

.status-deduction {
  background-color: #e74c3c;
}

/* 編輯模態框樣式 */
.edit-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.7);
  z-index: 1000;
  overflow: auto; /* 允許整個模態框區域滾動 */
}

.edit-modal-content {
  background-color: white;
  margin: 30px auto; /* 增加上下間距 */
  padding: 20px;
  width: 90%;
  max-width: 600px;
  border-radius: 8px;
  max-height: 80vh; /* 減小最大高度 */
  overflow-y: auto; /* 確保內容可以滾動 */
  position: relative; /* 確保定位正確 */
}

.close-btn {
  float: right;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  position: sticky; /* 使關閉按鈕固定在頂部 */
  top: 0;
  background-color: white;
  padding: 5px;
  z-index: 10;
}

.edit-form-group {
  margin-bottom: 15px;
}

.edit-form-label {
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
}

.edit-form-input {
  width: 100%;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 4px;
}

.edit-form-textarea {
  width: 100%;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 4px;
  min-height: 80px;
}

.edit-form-actions {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  position: sticky; /* 使按鈕區域固定在底部 */
  bottom: 0;
  background-color: white;
  padding: 10px 0;
}

.edit-form-actions button {
  margin-right: 10px;
}

.deduction-container {
  display: flex;
  align-items: center;
  margin-top: 8px;
}

.deduction-container input {
  width: 100px;
  margin-left: 10px;
}

/* 篩選按鈕樣式 */
.filter-container {
  margin: 20px 0;
  text-align: right;
}

.filter-btn {
  margin-left: 8px;
  padding: 6px 12px;
  background-color: #f0f0f0;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 4px;
  cursor: pointer;
}

.filter-btn.active {
  background-color: #2d7ff9;
  color: white;
  border-color: #2d7ff9;
}

/* 縮略圖樣式 */
.defect-thumbnail {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 4px;
  cursor: pointer;
}

/* 圖片查看器樣式 */
.image-viewer {
  display: none; /* 初始狀態為隱藏 */
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}

/* 當顯示圖片查看器時應用此樣式 */
.image-viewer.active {
  display: flex;
}

.image-viewer-content {
  max-width: 90%;
  max-height: 90%;
}

.image-viewer img {
  max-width: 100%;
  max-height: 100%;
}

.close-viewer {
  position: absolute;
  top: 20px;
  right: 20px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

/* 響應式表格樣式 */
@media (max-width: 768px) {
  table, thead, tbody, th, td, tr {
    display: block;
  }
  
  thead tr {
    position: absolute;
    top: -9999px;
    left: -9999px;
  }
  
  tr {
    margin-bottom: 15px;
    border: 1px solid #ddd;
  }
  
  td {
    border: none;
    border-bottom: 1px solid #eee;
    position: relative;
    padding-left: 50%;
  }
  
  td:before {
    position: absolute;
    top: 6px;
    left: 6px;
    width: 45%;
    padding-right: 10px;
    white-space: nowrap;
    font-weight: bold;
  }
  
  td:nth-of-type(1):before { content: "建案"; }
  td:nth-of-type(2):before { content: "棟別"; }
  td:nth-of-type(3):before { content: "樓層"; }
  td:nth-of-type(4):before { content: "工項"; }
  td:nth-of-type(5):before { content: "描述"; }
  td:nth-of-type(6):before { content: "狀態"; }
  td:nth-of-type(7):before { content: "照片"; }
  td:nth-of-type(8):before { content: "操作"; }
}
</style>
</head>

<body>

<button onclick="go('index.html')">回首頁</button>

<h2>缺失管理</h2>

<!-- 顯示當前建案 -->
<div class="current-project">
  當前建案: <span id="current-project-name"></span>
</div>

<div class="input-form">
  <div>
    建案
    <input id="project" disabled>
  </div>
  
  <div>
    棟別
    <input id="building">
  </div>
  
  <div>
    樓層
    <input id="floor">
  </div>
  
  <div>
    工項
    <input id="item">
  </div>
  
  <div>
    缺失描述
    <textarea id="desc"></textarea>
  </div>
  
  <div>
    照片
    <input type="file" id="photo" accept="image/*" capture="environment" onchange="previewImage(this)">
    <div id="preview-container" class="preview-container" style="display: none;">
      <img id="preview-image" class="preview-image">
      <span class="remove-preview" onclick="removePreview()">×</span>
    </div>
  </div>
  
  <button onclick="addDefect()">新增</button>
</div>

<!-- 篩選按鈕 -->
<div class="filter-container">
  <button id="filter-all" class="filter-btn active" onclick="filterDefects('all')">全部</button>
  <button id="filter-pending" class="filter-btn" onclick="filterDefects('pending')">未完成</button>
  <button id="filter-completed" class="filter-btn" onclick="filterDefects('completed')">已完成</button>
  <button id="filter-deduction" class="filter-btn" onclick="filterDefects('deduction')">代工扣款</button>
</div>

<table>

<thead>
<tr>
<th>建案</th>
<th>棟別</th>
<th>樓層</th>
<th>工項</th>
<th>描述</th>
<th>狀態</th>
<th>照片</th>
<th>操作</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

<!-- 編輯模態框 -->
<div id="editModal" class="edit-modal">
  <div class="edit-modal-content">
    <span class="close-btn" onclick="closeEditModal()">&times;</span>
    <h3>編輯缺失記錄</h3>
    
    <div class="edit-form-group">
      <label class="edit-form-label">棟別</label>
      <input id="edit-building" class="edit-form-input">
    </div>
    
    <div class="edit-form-group">
      <label class="edit-form-label">樓層</label>
      <input id="edit-floor" class="edit-form-input">
    </div>
    
    <div class="edit-form-group">
      <label class="edit-form-label">工項</label>
      <input id="edit-item" class="edit-form-input">
    </div>
    
    <div class="edit-form-group">
      <label class="edit-form-label">缺失描述</label>
      <textarea id="edit-desc" class="edit-form-textarea"></textarea>
    </div>
    
    <div class="edit-form-group">
      <label class="edit-form-label">照片</label>
      <div id="edit-photo-container"></div>
      <input type="file" id="edit-photo" accept="image/*" capture="environment" onchange="previewEditImage(this)">
      <div id="edit-preview-container" class="preview-container" style="display: none;">
        <img id="edit-preview-image" class="preview-image">
        <span class="remove-preview" onclick="removeEditPreview()">×</span>
      </div>
    </div>
    
    <div class="edit-form-group">
      <label class="edit-form-label">狀態</label>
      <select id="edit-status" class="edit-form-input" onchange="toggleDeductionInput()">
        <option value="pending">未完成</option>
        <option value="completed">已完成</option>
        <option value="deduction">代工扣款</option>
      </select>
      
      <div id="deduction-container" class="deduction-container" style="display: none;">
        <label>扣工數量:</label>
        <input type="number" id="edit-deduction" class="edit-form-input" min="0" step="0.1">
      </div>
    </div>
    
    <div class="edit-form-actions">
      <div>
        <button onclick="saveEdit()">保存</button>
        <button onclick="closeEditModal()">取消</button>
      </div>
      <button onclick="deleteDefect()" style="background-color: #e74c3c;">刪除</button>
    </div>
  </div>
</div>

<!-- 圖片查看器 -->
<div id="imageViewer" class="image-viewer">
  <span class="close-viewer" onclick="closeImageViewer()">&times;</span>
  <div class="image-viewer-content">
    <img id="fullImage">
  </div>
</div>

<script src="js/main.js"></script>

<script>

// 使用建案隔離的數據存取方式
let defects = getProjectData("defects");

// 顯示當前建案名稱
const currentProjectName = getCurrentProject();
document.getElementById("current-project-name").innerText = currentProjectName;
document.getElementById("project").value = currentProjectName;

// 當前選中的編輯索引
let currentEditIndex = -1;
// 當前篩選狀態
let currentFilter = 'all';
// 存儲圖片的臨時變數
let tempImage = null;
let tempEditImage = null;

function save(){
  saveProjectData("defects", defects);
}

// 渲染所有缺失記錄
function render(){
  let html = "";
  
  // 篩選記錄
  const filteredDefects = defects.filter(defect => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'pending' && (!defect.status || defect.status === 'pending')) return true;
    if (currentFilter === 'completed' && defect.status === 'completed') return true;
    if (currentFilter === 'deduction' && defect.status === 'deduction') return true;
    return false;
  });

  filteredDefects.forEach((d, i) => {
    // 找到原始索引，確保編輯和刪除功能正確
    const originalIndex = defects.indexOf(d);
    
    // 根據狀態設置樣式
    let statusBadge = '';
    if (!d.status || d.status === 'pending') {
      statusBadge = '<span class="status-badge status-pending">未完成</span>';
    } else if (d.status === 'completed') {
      statusBadge = '<span class="status-badge status-completed">已完成</span>';
    } else if (d.status === 'deduction') {
      statusBadge = `<span class="status-badge status-deduction">代工扣款 ${d.deduction || 0}</span>`;
    }
    
    // 照片顯示
    let photoHtml = '';
    if (d.photo) {
      photoHtml = `<img src="${d.photo}" class="defect-thumbnail" onclick="showFullImage('${d.photo}')">`;
    } else {
      photoHtml = '<span>無照片</span>';
    }
    
    html += `
    <tr>
      <td>${d.project}</td>
      <td>${d.building || ''}</td>
      <td>${d.floor || ''}</td>
      <td>${d.item || ''}</td>
      <td>${d.desc || ''}</td>
      <td>${statusBadge}</td>
      <td>${photoHtml}</td>
      <td>
        <button onclick="editDefect(${originalIndex})">編輯</button>
      </td>
    </tr>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// 預覽圖片
function previewImage(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    tempImage = e.target.result;
    document.getElementById("preview-image").src = tempImage;
    document.getElementById("preview-container").style.display = "block";
  };
  reader.readAsDataURL(file);
}

// 移除預覽圖片
function removePreview() {
  document.getElementById("preview-container").style.display = "none";
  document.getElementById("photo").value = "";
  tempImage = null;
}

// 預覽編輯時的圖片
function previewEditImage(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    tempEditImage = e.target.result;
    document.getElementById("edit-preview-image").src = tempEditImage;
    document.getElementById("edit-preview-container").style.display = "block";
  };
  reader.readAsDataURL(file);
}

// 移除編輯預覽圖片
function removeEditPreview() {
  document.getElementById("edit-preview-container").style.display = "none";
  document.getElementById("edit-photo").value = "";
  tempEditImage = null;
}

// 切換扣款輸入框顯示
function toggleDeductionInput() {
  const status = document.getElementById("edit-status").value;
  document.getElementById("deduction-container").style.display = 
    status === 'deduction' ? 'flex' : 'none';
}

// 顯示完整圖片
function showFullImage(src) {
  document.getElementById("fullImage").src = src;
  document.getElementById("imageViewer").classList.add("active");
}

// 關閉圖片查看器
function closeImageViewer() {
  document.getElementById("imageViewer").classList.remove("active");
}

// 篩選缺失記錄
function filterDefects(filter) {
  currentFilter = filter;
  
  // 更新按鈕狀態
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  document.getElementById(`filter-${filter}`).classList.add('active');
  
  render();
}

// 添加缺失記錄
function addDefect(){
  // 檢查必要欄位
  if (!building.value || !floor.value || !item.value || !desc.value) {
    alert("請填寫所有必填欄位");
    return;
  }

  defects.push({
    project: currentProjectName,
    building: building.value,
    floor: floor.value,
    item: item.value,
    desc: desc.value,
    photo: tempImage,
    status: 'pending',  // 默認未完成
    timestamp: new Date().toISOString()  // 添加時間戳記錄
  });

  save();
  render();
  
  // 清空輸入欄位
  building.value = "";
  floor.value = "";
  item.value = "";
  desc.value = "";
  removePreview();
}

// 編輯缺失記錄
function editDefect(index) {
  const defect = defects[index];
  if (!defect) return;
  
  // 設置當前編輯索引
  currentEditIndex = index;
  
  // 填充表單數據
  document.getElementById("edit-building").value = defect.building || '';
  document.getElementById("edit-floor").value = defect.floor || '';
  document.getElementById("edit-item").value = defect.item || '';
  document.getElementById("edit-desc").value = defect.desc || '';
  document.getElementById("edit-status").value = defect.status || 'pending';
  document.getElementById("edit-deduction").value = defect.deduction || '0';
  
  // 顯示扣款輸入框（如果適用）
  toggleDeductionInput();
  
  // 顯示圖片（如果有）
  const photoContainer = document.getElementById("edit-photo-container");
  if (defect.photo) {
    photoContainer.innerHTML = `
      <div style="margin-bottom: 10px;">
        <img src="${defect.photo}" style="max-width: 200px; max-height: 150px;">
      </div>
    `;
  } else {
    photoContainer.innerHTML = '<p>無照片</p>';
  }
  
  // 重置臨時編輯圖片
  tempEditImage = null;
  document.getElementById("edit-preview-container").style.display = "none";
  
  // 顯示模態框
  document.getElementById("editModal").style.display = "block";
}

// 關閉編輯模態框
function closeEditModal() {
  document.getElementById("editModal").style.display = "none";
  currentEditIndex = -1;
}

// 保存編輯內容
function saveEdit() {
  if (currentEditIndex < 0) return;
  
  // 檢查必要欄位
  if (!document.getElementById("edit-building").value || 
      !document.getElementById("edit-floor").value || 
      !document.getElementById("edit-item").value || 
      !document.getElementById("edit-desc").value) {
    alert("請填寫所有必填欄位");
    return;
  }
  
  // 獲取當前狀態
  const status = document.getElementById("edit-status").value;
  
  // 更新缺失記錄
  defects[currentEditIndex] = {
    ...defects[currentEditIndex],  // 保留原始數據
    building: document.getElementById("edit-building").value,
    floor: document.getElementById("edit-floor").value,
    item: document.getElementById("edit-item").value,
    desc: document.getElementById("edit-desc").value,
    status: status,
    lastUpdated: new Date().toISOString()  // 記錄最後更新時間
  };
  
  // 如果是代工扣款，添加扣款數量
  if (status === 'deduction') {
    defects[currentEditIndex].deduction = document.getElementById("edit-deduction").value;
  }
  
  // 如果上傳了新圖片，更新圖片
  if (tempEditImage) {
    defects[currentEditIndex].photo = tempEditImage;
  }
  
  save();
  render();
  closeEditModal();
}

// 刪除缺失記錄
function deleteDefect() {
  if (currentEditIndex < 0) return;
  
  if (confirm("確定要刪除此缺失記錄嗎？")) {
    defects.splice(currentEditIndex, 1);
    save();
    render();
    closeEditModal();
  }
}

// 初始渲染
render();

// 監聽鍵盤ESC鍵關閉模態框
document.addEventListener('keydown', function(e) {
  if (e.key === "Escape") {
    closeEditModal();
    closeImageViewer();
  }
});

// 點擊模態框外部關閉
window.addEventListener('click', function(e) {
  if (e.target === document.getElementById("editModal")) {
    closeEditModal();
  }
  
  if (e.target === document.getElementById("imageViewer")) {
    closeImageViewer();
  }
});
</script>

</body>
</html>
