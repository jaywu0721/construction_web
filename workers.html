<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>人員出工</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<button onclick="go('index.html')">回首頁</button>

<h2>人員出工</h2>

日期
<input type="date" id="date">

工種
<input id="type" list="type-options" autocomplete="off">
<datalist id="type-options"></datalist>

人數
<input id="count">

工作內容
<input id="content" placeholder="請輸入工作內容...">

<button onclick="addWorker()">新增</button>

<table>

<thead>
<tr>
<th>日期</th>
<th>工種</th>
<th>人數</th>
<th>工作內容</th>
<th>刪除</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

<script src="js/main.js"></script>

<script>

let workers = JSON.parse(localStorage.getItem("workers")) || [];
// 新增工種記錄陣列
let workerTypes = JSON.parse(localStorage.getItem("workerTypes")) || [];

function save(){
  localStorage.setItem("workers", JSON.stringify(workers));
  localStorage.setItem("workerTypes", JSON.stringify(workerTypes));
}

function render(){
  let html = "";

  workers.forEach((w,i)=>{
    html += `
    <tr>
      <td>${w.date || ''}</td>
      <td>${w.type || ''}</td>
      <td>${w.count || ''}</td>
      <td>${w.content || ''}</td>
      <td><button onclick="remove(${i})">刪除</button></td>
    </tr>
    `;
  });

  document.getElementById("list").innerHTML = html;
  
  // 渲染工種下拉選單
  renderTypeOptions();
}

// 渲染工種選項
function renderTypeOptions() {
  let options = "";
  
  // 確保工種不重複
  const uniqueTypes = [...new Set(workerTypes)];
  
  uniqueTypes.forEach(type => {
    options += `<option value="${type}"></option>`;
  });
  
  document.getElementById("type-options").innerHTML = options;
}

function addWorker(){
  // 獲取工種值
  const typeValue = document.getElementById("type").value.trim();
  
  // 如果是新的工種，則添加到工種記錄中
  if(typeValue && !workerTypes.includes(typeValue)) {
    workerTypes.push(typeValue);
  }
  
  workers.push({
    date: date.value,
    type: typeValue,
    count: count.value,
    content: content.value // 新增工作內容
  });

  save();
  render();
  
  // 清空輸入欄位
  date.value = "";
  document.getElementById("type").value = "";
  count.value = "";
  content.value = "";
}

function remove(i){
  workers.splice(i,1);
  save();
  render();
}

render();

</script>

</body>
</html>
