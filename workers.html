<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>人員出工</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<button onclick="go('index.html')">回首頁</button>

<h2>人員出工</h2>
<!-- 顯示當前建案 -->
<div class="current-project">
  當前建案: <span id="current-project-name"></span>
</div>

日期
<input type="date" id="date">

工種
<input id="type" list="type-options" autocomplete="off">
<datalist id="type-options"></datalist>

人數
<input id="count">

工作內容
<input id="content" placeholder="請輸入工作內容...">

<button onclick="addWorker()">新增</button>

<div style="margin-top: 20px; margin-bottom: 10px;">
  <button onclick="filterRecords('all')">全部</button>
  <button onclick="filterRecords('today')">今日</button>
  <button onclick="filterRecords('14days')">14日</button>
</div>

<table>

<thead>
<tr>
<th>日期</th>
<th>工種</th>
<th>人數</th>
<th>工作內容</th>
<th>刪除</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

<script src="js/main.js"></script>

<script>
// 使用建案隔離的數據存取方式
let workers = getProjectData("workers");
let workerTypes = getProjectData("workerTypes");
let currentFilter = 'all';

// 顯示當前建案名稱
document.getElementById("current-project-name").innerText = getCurrentProject();

function save(){
  saveProjectData("workers", workers);
  saveProjectData("workerTypes", workerTypes);
}

function render(){
  let html = "";
  
  // 獲取篩選後的記錄
  const filteredWorkers = getFilteredWorkers();

  filteredWorkers.forEach((w,i)=>{
    // 使用原始索引，確保刪除功能正確
    const originalIndex = workers.findIndex(worker => 
      worker.date === w.date && 
      worker.type === w.type && 
      worker.count === w.count && 
      worker.content === w.content
    );
    
    html += `
    <tr>
      <td>${w.date || ''}</td>
      <td>${w.type || ''}</td>
      <td>${w.count || ''}</td>
      <td>${w.content || ''}</td>
      <td><button onclick="remove(${originalIndex})">刪除</button></td>
    </tr>
    `;
  });

  document.getElementById("list").innerHTML = html;
  
  // 渲染工種下拉選單
  renderTypeOptions();
}

// 篩選記錄
function filterRecords(filter) {
  currentFilter = filter;
  render();
}

// 獲取篩選後的記錄
function getFilteredWorkers() {
  if (currentFilter === 'all') {
    return [...workers];
  }
  
  // 獲取今天的日期字符串（YYYY-MM-DD格式）
  const today = new Date();
  const todayString = today.getFullYear() + '-' + 
                      String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                      String(today.getDate()).padStart(2, '0');
  
  if (currentFilter === 'today') {
    return workers.filter(worker => worker.date === todayString);
  } else if (currentFilter === '14days') {
    // 計算14天前的日期
    const fourteenDaysAgo = new Date();
    fourteenDaysAgo.setDate(today.getDate() - 13); // 14天包含今天
    
    return workers.filter(worker => {
      if (!worker.date) return false;
      
      // 將工人的日期字符串轉換為日期對象進行比較
      const workerDate = new Date(worker.date + 'T00:00:00'); // 添加時間部分以確保一致性
      return workerDate >= fourteenDaysAgo && workerDate <= today;
    });
  }
  
  return [...workers];
}

// 渲染工種選項
function renderTypeOptions() {
  let options = "";
  
  // 確保工種不重複
  const uniqueTypes = [...new Set(workerTypes)];
  
  uniqueTypes.forEach(type => {
    options += `<option value="${type}"></option>`;
  });
  
  document.getElementById("type-options").innerHTML = options;
}

function addWorker(){
  // 獲取工種值
  const typeValue = document.getElementById("type").value.trim();
  
  // 如果是新的工種，則添加到工種記錄中
  if(typeValue && !workerTypes.includes(typeValue)) {
    workerTypes.push(typeValue);
  }
  
  workers.push({
    date: date.value,
    type: typeValue,
    count: count.value,
    content: content.value // 新增工作內容
  });

  save();
  render();
  
  // 清空輸入欄位
  date.value = "";
  document.getElementById("type").value = "";
  count.value = "";
  content.value = "";
}

function remove(i){
  workers.splice(i,1);
  save();
  render();
}

render();

</script>

</body>
</html>
