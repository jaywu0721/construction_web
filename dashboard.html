<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<button onclick="go('index.html')">回首頁</button>

<h2>工程系統Dashboard</h2>

<!-- 顯示當前建案 -->
<div class="current-project">
  當前建案: <span id="current-project-name"></span>
</div>

<table>

<tr>
<th>項目</th>
<th>數量</th>
</tr>

<tr>
<td>缺失紀錄</td>
<td id="defects"></td>
</tr>

<tr>
<td>施工日誌</td>
<td id="logs"></td>
</tr>

<tr>
<td>施工照片</td>
<td id="photos"></td>
</tr>

</table>

<script src="js/main.js"></script>

<script>

// 顯示當前建案名稱
document.getElementById("current-project-name").innerText = getCurrentProject();

// 使用建案隔離的數據讀取方式
let defects = getProjectData("defects");
let logs = getProjectData("logs");
let photos = getProjectData("photos");

document.getElementById("defects").innerText = defects.length;
document.getElementById("logs").innerText = logs.length;
document.getElementById("photos").innerText = photos.length;

</script>

</body>
</html>
